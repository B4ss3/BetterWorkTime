name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect solution file
        id: sol
        shell: pwsh
        run: |
          $sln = Get-ChildItem -Recurse -Filter *.sln -ErrorAction SilentlyContinue | Select-Object -First 1
          $slnx = Get-ChildItem -Recurse -Filter *.slnx -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($sln) {
            "solution=$($sln.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          } elseif ($slnx) {
            "solution=$($slnx.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          } else {
            "solution=" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          }

      - name: Detect .NET projects
        id: detect
        shell: pwsh
        run: |
          $hasSln = (Get-ChildItem -Recurse -Filter *.sln -ErrorAction SilentlyContinue | Select-Object -First 1)
          $hasCsproj = (Get-ChildItem -Recurse -Filter *.csproj -ErrorAction SilentlyContinue | Select-Object -First 1)
          if ($hasSln -or $hasCsproj) {
            "has_dotnet=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          } else {
            "has_dotnet=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          }

      - name: Setup .NET
        if: steps.detect.outputs.has_dotnet == 'true'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        if: steps.sol.outputs.solution != ''
        run: dotnet restore "${{ steps.sol.outputs.solution }}"

      - name: Build
        if: steps.sol.outputs.solution != ''
        run: dotnet build "${{ steps.sol.outputs.solution }}" --no-restore -c Release

      - name: Test
        if: steps.sol.outputs.solution != ''
        run: dotnet test "${{ steps.sol.outputs.solution }}" --no-build -c Release

      - name: Skip (no solution yet)
        if: steps.sol.outputs.solution == ''
        run: echo "No .sln/.slnx found — skipping."



      - name: Skip (no .NET solution yet)
        if: steps.detect.outputs.has_dotnet != 'true'
        run: echo "No .sln/.csproj found yet — skipping build/test."
